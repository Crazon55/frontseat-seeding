# Render Blueprint — one web service (Docker)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: frontseat-seeding
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: frontseat_seeding
      - key: ENABLE_DEV_SESSION
        value: "true"
      - key: SINGLE_ORIGIN
        value: "true"
      - key: CORS_ORIGINS
        sync: false
      - key: EMERGENT_LLM_KEY
        sync: false
        optional: true
