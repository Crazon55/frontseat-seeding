# Copy to apprunner.yaml in repo root for AWS App Runner (source: GitHub + Dockerfile in backend/)

version: 1.0
runtime: docker
build:
  commands:
    build:
      - echo "Building Frontseat Seeding API"
run:
  runtime-version: latest
  command: uvicorn server:app --host 0.0.0.0 --port 8000
  network:
    port: 8000
  env:
    - name: APP_NAME
      value: frontseat-seeding
    - name: ENABLE_DEV_SESSION
      value: "false"
    # Set secrets in App Runner console or via AWS Secrets Manager:
    # DATABASE_URL, SUPABASE_JWT_SECRET, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, CORS_ORIGINS
